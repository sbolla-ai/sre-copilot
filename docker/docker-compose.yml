# Local observability stack for the SRE Copilot side project.
#
# This is intentionally minimal — just enough to:
#   1. Receive OpenTelemetry traces from the agent (jaeger)
#   2. Provide a target for any future "real" tooling experiments
#
# For the article's claims to be defensible you don't need a heavy stack.
# Synthetic data generated by the IncidentGenerator drives the eval harness;
# this compose file is mostly here so OTel traces have somewhere to go.

services:
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: sre-copilot-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - sre-copilot

  # Optional: a Prometheus you can point a future "real metrics" experiment at.
  # Uncomment when you want to extend beyond synthetic data.
  #
  # prometheus:
  #   image: prom/prometheus:v2.54.0
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   networks:
  #     - sre-copilot

networks:
  sre-copilot:
    driver: bridge
